name: Status logger

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub's minimum; may lag a few min under load)
  workflow_dispatch:          # lets you run it on demand from the Actions tab

permissions:
  contents: write             # needed so the job can commit the log back to the repo

concurrency:
  group: status-logger
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Poll Olo + DoorDash
        run: node scripts/poll-status.js

      - name: Commit if status changed
        run: |
          if [ -f .status-commitmsg ]; then
            git config user.name  "status-bot"
            git config user.email "status-bot@users.noreply.github.com"
            git add status-latest.json history.json
            git commit -m "$(cat .status-commitmsg)" || echo "nothing staged"
            rm -f .status-commitmsg
            git push
          else
            echo "No status change this run — nothing to commit."
          fi
